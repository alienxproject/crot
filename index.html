<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TikTod</title>
<link rel="icon" href="https://static.vecteezy.com/system/resources/thumbnails/045/832/436/small_2x/3d-pink-alphabet-letter-t-png.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #000;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  position: fixed;
  user-select: none;
  -webkit-user-select: none;
}

#feed {
  width: 100%;
  height: 100%;
  position: relative;
  overflow: hidden;
}

.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  background: #000;
}
.slide.active {
  opacity: 1;
  pointer-events: auto;
  z-index: 2;
}

/* Thumbnail cover sebelum iframe dimuat */
.slide-thumb {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  z-index: 1;
  transition: opacity 0.3s;
}
.slide-thumb.hidden { opacity: 0; pointer-events: none; }

/* Iframe video */
.slide iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
  position: absolute;
  inset: 0;
  z-index: 2;
}

/* Gradient bawah */
.slide::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom,
    rgba(0,0,0,0.1) 0%,
    transparent 25%,
    transparent 55%,
    rgba(0,0,0,0.65) 100%
  );
  pointer-events: none;
  z-index: 3;
}

.info {
  position: absolute;
  bottom: max(88px, calc(72px + env(safe-area-inset-bottom, 0px)));
  left: 14px;
  right: 70px;
  z-index: 5;
  color: #fff;
}
.info h3 {
  font-size: 15px;
  font-weight: 700;
  text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  margin-bottom: 3px;
  line-height: 1.3;
}
.info span {
  font-size: 12px;
  opacity: 0.7;
}

/* Play icon */
.play-icon {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.6);
  font-size: 60px;
  color: #fff;
  z-index: 7;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.12s, transform 0.12s;
  text-shadow: 0 2px 16px rgba(0,0,0,0.5);
}
.play-icon.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

/* Spinner buffering */
.spinner {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 38px; height: 38px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: rgba(255,255,255,0.9);
  border-radius: 50%;
  z-index: 8;
  opacity: 1;
  pointer-events: none;
  animation: spin 0.75s linear infinite;
  transition: opacity 0.15s;
}
.spinner.hidden { opacity: 0; }
@keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

/* Logo */
#logoHome {
  position: fixed;
  top: 14px; left: 14px;
  z-index: 9999;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.12s;
}
#logoHome:active { transform: scale(0.92); }
#logoHome img {
  width: 88px;
  height: auto;
  display: block;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
}

/* Swipe hint */
#swipeHint {
  position: fixed;
  bottom: max(116px, calc(96px + env(safe-area-inset-bottom, 0px)));
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 8px 18px;
  border-radius: 24px;
  pointer-events: none;
  white-space: nowrap;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.4s, visibility 0.4s;
}
#swipeHint.show {
  opacity: 1;
  visibility: visible;
  animation: hintBounce 1.4s ease-in-out 0.4s infinite;
}
#swipeHint.hide {
  opacity: 0;
  visibility: hidden;
  animation: none;
}
@keyframes hintBounce {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(-8px); }
}

/* Side dots */
#dots {
  position: fixed;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 60vh;
  overflow: hidden;
  align-items: center;
}
.dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  transition: all 0.2s;
  flex-shrink: 0;
}
.dot.active {
  background: #fff;
  height: 16px;
  border-radius: 3px;
}
</style>
</head>
<body>

<div id="logoHome">
  <img src="https://i.ibb.co.com/5XCdSQrN/Tik-Tod-1.png" alt="TikTod">
</div>

<div id="swipeHint">☝️ swipe up untuk next</div>
<div id="dots"></div>
<div id="feed"></div>

<script src="data/videos.js"></script>
<script>
// Guard
if (typeof videos === 'undefined' || !Array.isArray(videos) || videos.length === 0) {
  document.getElementById('feed').innerHTML =
    '<div style="color:#fff;text-align:center;padding-top:40vh;font-size:16px">Gagal memuat video.<br>Cek file data/videos.js</div>';
  throw new Error('videos.js tidak ditemukan atau kosong');
}

// CTA URL
const CTA_URL = (function() {
  if (typeof ctaUrl !== 'undefined' && ctaUrl) return ctaUrl;
  const found = videos.find(v => v.cta);
  return found ? found.cta : '';
})();
const CTA_SWIPES = 3;

// SHUFFLE
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// STATE
const vlist     = shuffle(videos);
const total     = vlist.length;
let current     = 0;
let locked      = false;
let interacted  = false;
let swipeCount  = 0;
let ctaFired    = false;
let hasLeftHome = false;

const feed      = document.getElementById('feed');
const dotsEl    = document.getElementById('dots');
const swipeHint = document.getElementById('swipeHint');
const slides    = [];

// BUILD DOM — pakai iframe untuk vidlc embed
vlist.forEach((v, i) => {
  const slide = document.createElement('div');
  slide.className = 'slide';

  // Thumbnail cover (tampil sebelum user tap play)
  const thumb = document.createElement('div');
  thumb.className = 'slide-thumb';
  if (v.thumb) thumb.style.backgroundImage = "url('" + v.thumb + "')";

  // Iframe — src hanya diisi saat user tap (lazy load)
  const iframe = document.createElement('iframe');
  iframe.setAttribute('allowfullscreen', '');
  iframe.setAttribute('allow', 'autoplay; fullscreen');
  iframe.setAttribute('scrolling', 'no');
  iframe.dataset.src = v.embed + '?autoplay=1';

  // Info judul
  const info = document.createElement('div');
  info.className = 'info';
  const h3 = document.createElement('h3');
  h3.textContent = v.title || '';
  const sp = document.createElement('span');
  sp.textContent = v.views || '';
  info.appendChild(h3);
  info.appendChild(sp);

  // Play icon
  const playIcon = document.createElement('div');
  playIcon.className = 'play-icon show';
  playIcon.textContent = '▶';

  // Spinner
  const spinner = document.createElement('div');
  spinner.className = 'spinner hidden';

  slide.appendChild(thumb);
  slide.appendChild(iframe);
  slide.appendChild(info);
  slide.appendChild(playIcon);
  slide.appendChild(spinner);
  feed.appendChild(slide);
  slides.push(slide);

  // Tap untuk load iframe
  slide.addEventListener('click', (e) => {
    if (locked) return;
    e.stopPropagation();
    interacted = true;
    dismissHint();

    const pi = slide.querySelector('.play-icon');
    const th = slide.querySelector('.slide-thumb');
    const sp = slide.querySelector('.spinner');
    const fr = slide.querySelector('iframe');

    if (!fr.src) {
      pi.classList.remove('show');
      sp.classList.remove('hidden');
      fr.src = fr.dataset.src;
      fr.onload = () => {
        sp.classList.add('hidden');
        th.classList.add('hidden');
      };
    }
  });
});

// Dots
vlist.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  dotsEl.appendChild(d);
});

// NAVIGATE
function goTo(next, force, isUserSwipe) {
  if (locked && !force) return;
  if (next === current && !force) return;

  locked = true;

  const prev = current;

  // Reset iframe slide yang ditinggalkan
  const prevSlide  = slides[prev];
  const prevIframe = prevSlide.querySelector('iframe');
  const prevThumb  = prevSlide.querySelector('.slide-thumb');
  const prevPi     = prevSlide.querySelector('.play-icon');
  if (prevIframe.src) {
    prevIframe.src = '';
    prevThumb.classList.remove('hidden');
    prevPi.textContent = '▶';
    prevPi.classList.add('show');
  }

  slides.forEach(s => s.classList.remove('active'));
  current = next;
  slides[current].classList.add('active');
  dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));

  setTimeout(() => { locked = false; }, 280);

  // CTA
  if (!ctaFired && isUserSwipe) {
    if (!hasLeftHome && prev === 0) hasLeftHome = true;
    if (hasLeftHome) {
      swipeCount++;
      if (swipeCount >= CTA_SWIPES && CTA_URL) {
        ctaFired = true;
        setTimeout(() => { window.open(CTA_URL, '_blank'); }, 400);
      }
    }
  }
}

// INIT
slides[0].classList.add('active');

// Swipe hint
let hintDone = false;
function dismissHint() {
  if (hintDone) return;
  hintDone = true;
  swipeHint.classList.remove('show');
  swipeHint.classList.add('hide');
}
setTimeout(() => {
  if (hintDone) return;
  swipeHint.classList.add('show');
  setTimeout(dismissHint, 4000);
}, 900);

// TOUCH SWIPE
let ty = 0, tx = 0, tt = 0, tVert = false;

feed.addEventListener('touchstart', (e) => {
  ty = e.touches[0].clientY;
  tx = e.touches[0].clientX;
  tt = Date.now();
  tVert = false;
}, { passive: true });

feed.addEventListener('touchmove', (e) => {
  const dy = ty - e.touches[0].clientY;
  const dx = tx - e.touches[0].clientX;
  if (!tVert && (Math.abs(dy) > 8 || Math.abs(dx) > 8)) {
    tVert = Math.abs(dy) >= Math.abs(dx);
  }
  if (tVert) e.preventDefault();
}, { passive: false });

feed.addEventListener('touchend', (e) => {
  if (!tVert || locked) return;
  const dy  = ty - e.changedTouches[0].clientY;
  const vel = Math.abs(dy) / Math.max(Date.now() - tt, 1);
  if (Math.abs(dy) < 40 && vel < 0.3) return;
  interacted = true;
  dismissHint();
  goTo(dy > 0 ? (current + 1) % total : (current - 1 + total) % total, false, true);
}, { passive: true });

// KEYBOARD
document.addEventListener('keydown', (e) => {
  if (locked) return;
  if (e.key === 'ArrowDown') { dismissHint(); goTo((current + 1) % total, false, true); }
  if (e.key === 'ArrowUp')   { goTo((current - 1 + total) % total, false, true); }
});

// WHEEL
let wc = false;
feed.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (locked || wc) return;
  wc = true; setTimeout(() => wc = false, 420);
  dismissHint();
  goTo(e.deltaY > 0 ? (current + 1) % total : (current - 1 + total) % total, false, true);
}, { passive: false });

// Blokir context menu
document.addEventListener('contextmenu', (e) => e.preventDefault());
feed.addEventListener('contextmenu',     (e) => e.preventDefault());

// LOGO HOME
document.getElementById('logoHome').addEventListener('click', (e) => {
  e.stopPropagation();
  locked = false;
  goTo(0, true, false);
});
</script>
</body>
</html>
